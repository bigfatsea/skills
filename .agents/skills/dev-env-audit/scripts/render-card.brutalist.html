<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dev-env-audit</title>
<style>
/* ============================================================
   dev-env-audit report card — "brutalist" theme
   - thick black borders, hard offset shadows, flat saturated
     color blocks, square corners, heavy uppercase type
   - self-contained: all CSS/JS/data inline, no external requests
   - status shown via CSS dots/bars, never colored emoji
   - deliberately loud in both light and dark system modes —
     that's the point of this theme, so both branches stay bold
   - responsive + print-friendly
   ============================================================ */
:root {
  --page-bg: #fff4b8;
  --term-bg: #ffffff;
  --term-bar: #111111;
  --term-border: #111111;
  --fg: #111111;
  --fg-muted: #4a4a4a;
  --border: #111111;
  --card-bg: #f3f3f3;
  --ok: #1fae5f;
  --warn: #ff9f0a;
  --fail: #ff3b30;
  --info: #8a8a8a;
  --accent: #ff5fd2;
  --link-bg: #111111;
  --link-fg: #ffffff;
}
@media (prefers-color-scheme: dark) {
  :root { --page-bg: #2b2b2b; --card-bg: #f3f3f3; }
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html {
  font-family: ui-sans-serif, "Helvetica Neue", Arial, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  background: var(--page-bg);
  color: var(--fg);
  padding: 2.75rem 1rem;
  min-height: 100vh;
}

.term {
  max-width: 720px;
  margin: 0 auto;
  background: var(--term-bg);
  border-radius: 0;
  overflow: hidden;
  border: 3px solid var(--term-border);
  box-shadow: 9px 9px 0 #111111;
}
.term-accent { height: 6px; background: var(--accent); border-bottom: 3px solid var(--term-border); }
.term-bar {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.625rem 1rem;
  background: var(--term-bar);
}
.term-dot { width: 11px; height: 11px; border-radius: 0; flex: none; border: 2px solid #fff; }
.term-dot-fail { background: var(--fail); }
.term-dot-warn { background: var(--warn); }
.term-dot-ok { background: var(--ok); }
.term-title {
  margin-left: 0.5rem; font-size: 0.75rem; color: #fff; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.03em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.term-meta { margin-left: auto; font-size: 0.6875rem; color: #d8d8d8; white-space: nowrap; padding-left: 0.75rem; font-weight: 700; }
.term-body { padding: 1.25rem 1.25rem 0.25rem; }

.hero { display: flex; align-items: center; gap: 1rem; padding-bottom: 1.125rem; margin-bottom: 1.125rem; border-bottom: 3px solid var(--border); }
.grade {
  flex: none; width: 4.25rem; height: 4.25rem; border-radius: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.375rem; font-weight: 900; border: 3px solid var(--border); line-height: 1;
  box-shadow: 4px 4px 0 #111111;
}
.grade-excellent, .grade-good { background: var(--ok); color: #06210f; }
.grade-needs-attention, .grade-at-risk { background: var(--warn); color: #2b1900; }
.grade-critical { background: var(--fail); color: #2b0705; }

.hero-main { flex: 1; min-width: 0; }
.hero-score-row { display: flex; align-items: baseline; gap: 0.375rem; }
.hero-score { font-size: 2rem; font-weight: 900; font-variant-numeric: tabular-nums; }
.hero-score-suffix { font-size: 0.875rem; color: var(--fg-muted); font-weight: 700; }
.hero-tier { font-size: 0.8125rem; font-weight: 800; margin-top: 0.125rem; text-transform: uppercase; letter-spacing: 0.04em; }
.tier-excellent, .tier-good { color: #0d7a3f; }
.tier-needs-attention, .tier-at-risk { color: #b06b00; }
.tier-critical { color: #c81f16; }
.hero-counts { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
.chip { font-size: 0.6875rem; font-weight: 700; padding: 0.1875rem 0.5rem; border-radius: 0; border: 2px solid var(--border); color: var(--fg); white-space: nowrap; background: var(--card-bg); }
.chip .dot { margin-right: 0.3125rem; }

.dot { display: inline-block; width: 8px; height: 8px; border-radius: 0; flex: none; border: 1px solid var(--border); }
.dot-ok { background: var(--ok); }
.dot-warn { background: var(--warn); }
.dot-fail { background: var(--fail); }
.dot-info { background: var(--info); }

.metrics { margin-bottom: 1.125rem; }
.metric { display: flex; align-items: center; gap: 0.625rem; font-size: 0.6875rem; font-weight: 700; padding: 0.3125rem 0; }
.metric-label { width: 5rem; flex: none; color: var(--fg); text-transform: uppercase; font-size: 0.625rem; letter-spacing: 0.04em; }
.metric-bar { flex: 1; height: 10px; border-radius: 0; background: var(--card-bg); border: 2px solid var(--border); overflow: hidden; display: block; }
.metric-fill { height: 100%; border-radius: 0; display: block; }
.metric-value { width: 2rem; flex: none; text-align: right; font-variant-numeric: tabular-nums; }

.section-title { font-size: 0.6875rem; font-weight: 900; color: var(--fg); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.625rem; }

.cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1.125rem; padding-bottom: 1.125rem; margin-bottom: 1.125rem; border-bottom: 3px solid var(--border); }
.list { list-style: none; }
.list li { display: flex; gap: 0.5rem; padding: 0.375rem 0; align-items: flex-start; }
.list .dot { margin-top: 0.4em; }
.item-title { font-size: 0.75rem; font-weight: 800; line-height: 1.3; }
.item-detail { font-size: 0.6875rem; color: var(--fg-muted); line-height: 1.4; margin-top: 0.125rem; font-weight: 500; }

.langs { padding-bottom: 1.125rem; }
.lang-grid { display: flex; flex-wrap: wrap; gap: 0.375rem; }
.lang { display: flex; align-items: center; gap: 0.375rem; padding: 0.25rem 0.625rem; border-radius: 0; background: var(--card-bg); border: 2px solid var(--border); font-size: 0.6875rem; font-weight: 700; }

.report-link-wrap { padding-bottom: 1.125rem; }
.report-link {
  display: inline-block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--link-fg); background: var(--link-bg); text-decoration: none;
  padding: 0.5rem 0.875rem; border: 2px solid var(--border); box-shadow: 3px 3px 0 var(--accent);
}

.term-footer {
  text-align: center; color: #fff; font-size: 0.625rem; font-weight: 700;
  padding: 0.75rem 0; background: var(--term-bar); text-transform: uppercase; letter-spacing: 0.04em;
}

.error-box { margin: 1.25rem; padding: 1rem; border: 3px solid var(--fail); color: var(--fail); font-size: 0.75rem; font-weight: 700; line-height: 1.5; }

@media (max-width: 520px) {
  body { padding: 1rem 0.625rem; }
  .term-body { padding: 1rem 1rem 0.125rem; }
  .cols { grid-template-columns: 1fr; gap: 0; }
  .cols > .col:first-child { padding-bottom: 0.5rem; margin-bottom: 0.5rem; border-bottom: 3px solid var(--border); }
  .grade { width: 3.25rem; height: 3.25rem; font-size: 1.75rem; }
  .term-title { display: none; }
}
@media print {
  body { background: white; padding: 0; }
  .term { box-shadow: none; }
}
</style>
</head>
<body>
<div id="app"></div>

<!--
  Single data placeholder. Generating a report does exactly one mechanical
  thing: replace the line below with the real JSON text (after escaping
  "</" to "<\/" so a JSON string can't contain a literal "</script>" that
  would prematurely close this tag). See render-card.schema.md for the
  JSON field contract — unaffected by which of the 3 templates is used.
-->
<script id="audit-data" type="application/json">
%%AUDIT_JSON_DATA%%
</script>

<script>
(function () {
  "use strict";

  var COLOR_OK = "#1fae5f", COLOR_WARN = "#ff9f0a", COLOR_FAIL = "#ff3b30";
  var GRADE_MAP = { excellent: "A", good: "B", "needs-attention": "C", "at-risk": "D", critical: "F" };

  function clampScore(n) {
    n = Number(n);
    if (!isFinite(n)) n = 0;
    return Math.max(0, Math.min(100, Math.round(n)));
  }
  function colorForScore(s) {
    if (s >= 75) return COLOR_OK;
    if (s >= 40) return COLOR_WARN;
    return COLOR_FAIL;
  }
  function dotClassForStatus(status) {
    return { ok: "dot-ok", warn: "dot-warn", fail: "dot-fail" }[status] || "dot-info";
  }
  function el(tag, className, text) {
    var e = document.createElement(tag);
    if (className) e.className = className;
    if (text !== undefined && text !== null) e.textContent = text;
    return e; // textContent -> browser escapes automatically, no manual html-escape needed
  }
  function formatTimestamp(ts) {
    if (!ts) return "—";
    var d = new Date(ts);
    if (isNaN(d.getTime())) return String(ts);
    function pad(n) { return (n < 10 ? "0" : "") + n; }
    return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) +
           " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
  }

  function renderMetric(container, score, label) {
    score = clampScore(score);
    var color = colorForScore(score);
    var row = el("div", "metric");
    row.appendChild(el("span", "metric-label", label));
    var bar = el("span", "metric-bar");
    bar.setAttribute("role", "img");
    bar.setAttribute("aria-label", label + " score " + score);
    var fill = el("span", "metric-fill");
    fill.style.width = score + "%";
    fill.style.background = color;
    bar.appendChild(fill);
    row.appendChild(bar);
    row.appendChild(el("span", "metric-value", String(score)));
    container.appendChild(row);
  }

  function renderListItem(container, dotClass, title, detail) {
    var li = el("li");
    li.appendChild(el("span", "dot " + dotClass));
    var body = el("div");
    body.appendChild(el("div", "item-title", title || ""));
    if (detail) body.appendChild(el("div", "item-detail", detail));
    li.appendChild(body);
    container.appendChild(li);
  }

  function renderLangChip(container, name, status) {
    var chip = el("div", "lang");
    chip.appendChild(el("span", "dot " + dotClassForStatus(status)));
    chip.appendChild(el("span", "lang-name", name || ""));
    container.appendChild(chip);
  }

  function renderError(root, message) {
    var box = el("div", "error-box");
    box.textContent = "⚠ " + message;
    root.appendChild(box);
  }

  function render(root, data) {
    var counts = data.counts || {};
    var scores = data.scores || {};
    var host = data.host || {};
    var tier = data.tier || "unknown";
    var grade = GRADE_MAP[tier] || "?";
    var score = clampScore(data.score);

    var term = el("div", "term");
    term.appendChild(el("div", "term-accent"));

    var bar = el("div", "term-bar");
    bar.appendChild(el("span", "term-dot term-dot-fail"));
    bar.appendChild(el("span", "term-dot term-dot-warn"));
    bar.appendChild(el("span", "term-dot term-dot-ok"));
    bar.appendChild(el("span", "term-title",
      "dev-env-audit — " + (host.os || "Unknown") + " · " + (host.shell || "Unknown")));
    bar.appendChild(el("span", "term-meta", formatTimestamp(data.timestamp)));
    term.appendChild(bar);

    var body = el("div", "term-body");

    var hero = el("div", "hero");
    hero.appendChild(el("div", "grade grade-" + tier, grade));
    var heroMain = el("div", "hero-main");
    var scoreRow = el("div", "hero-score-row");
    scoreRow.appendChild(el("span", "hero-score", String(score)));
    scoreRow.appendChild(el("span", "hero-score-suffix", "/ 100"));
    heroMain.appendChild(scoreRow);
    heroMain.appendChild(el("div", "hero-tier tier-" + tier, data.tier_label || ""));
    var chips = el("div", "hero-counts");
    [["ok", "OK", counts.ok], ["warn", "WARN", counts.warn], ["fail", "FAIL", counts.fail]]
      .forEach(function (c) {
        var chip = el("span", "chip");
        chip.appendChild(el("span", "dot dot-" + c[0]));
        chip.appendChild(document.createTextNode(c[1] + " " + (c[2] || 0)));
        chips.appendChild(chip);
      });
    heroMain.appendChild(chips);
    hero.appendChild(heroMain);
    body.appendChild(hero);

    var metrics = el("div", "metrics");
    renderMetric(metrics, scores.stability, "Stability");
    renderMetric(metrics, scores.consistency, "Consistency");
    renderMetric(metrics, scores.modernity, "Modernity");
    body.appendChild(metrics);

    var cols = el("div", "cols");
    var actionsCol = el("div", "col");
    actionsCol.appendChild(el("div", "section-title", "Top Actions"));
    var actionsList = el("ul", "list actions");
    var actions = (data.top_actions || []).slice(0, 3);
    if (actions.length === 0) {
      renderListItem(actionsList, "dot-info", "None", "");
    } else {
      actions.forEach(function (a) {
        renderListItem(actionsList, a.severity === "fail" ? "dot-fail" : "dot-warn", a.title, a.detail);
      });
    }
    actionsCol.appendChild(actionsList);
    cols.appendChild(actionsCol);

    var findingsCol = el("div", "col");
    findingsCol.appendChild(el("div", "section-title", "Highlights"));
    var findingsList = el("ul", "list findings");
    var findings = data.positive_findings || [];
    if (findings.length === 0) {
      renderListItem(findingsList, "dot-info", "None", "");
    } else {
      findings.forEach(function (f) {
        renderListItem(findingsList, "dot-ok", f.title, f.detail);
      });
    }
    findingsCol.appendChild(findingsList);
    cols.appendChild(findingsCol);
    body.appendChild(cols);

    var langs = el("div", "langs");
    langs.appendChild(el("div", "section-title", "Languages"));
    var langGrid = el("div", "lang-grid");
    var languages = data.languages || [];
    if (languages.length === 0) {
      langGrid.appendChild(el("div", "lang", "—"));
    } else {
      languages.forEach(function (l) { renderLangChip(langGrid, l.name, l.status); });
    }
    langs.appendChild(langGrid);
    body.appendChild(langs);

    if (data.report_md) {
      var linkWrap = el("div", "report-link-wrap");
      var link = document.createElement("a");
      link.className = "report-link";
      link.href = data.report_md;
      link.textContent = "Full details in the Markdown report →";
      linkWrap.appendChild(link);
      body.appendChild(linkWrap);
    }

    term.appendChild(body);
    term.appendChild(el("div", "term-footer", "generated by dev-env-audit · read-only, no changes made"));

    root.appendChild(term);
  }

  var root = document.getElementById("app");
  var dataEl = document.getElementById("audit-data");
  var raw = dataEl ? dataEl.textContent : "";
  var data;
  try {
    data = JSON.parse(raw);
  } catch (err) {
    renderError(root, "report data missing or invalid JSON (" + err.message + "). " +
      "This file's data block was not filled in correctly when the report was generated.");
    return;
  }
  try {
    render(root, data);
  } catch (err) {
    renderError(root, "failed to render report (" + err.message + ").");
  }
})();
</script>
</body>
</html>
